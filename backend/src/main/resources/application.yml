spring:
  application:
    name: peerdrop-backend

  # Database Configuration
  datasource:
    # H2 In-Memory Database (for development)
    url: jdbc:h2:mem:peerdrop
    driver-class-name: org.h2.Driver
    username: sa
    password:

    # MySQL Configuration (uncomment for production)
    # url: jdbc:mysql://localhost:3306/peerdrop?createDatabaseIfNotExist=true
    # driver-class-name: com.mysql.cj.jdbc.Driver
    # username: root
    # password: your_password

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
        # For MySQL, use: org.hibernate.dialect.MySQLDialect

  # H2 Console (for development only)
  h2:
    console:
      enabled: true
      path: /h2-console

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /api

# CORS Configuration
cors:
  allowed-origins: "*"
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"

# Room Configuration
peerdrop:
  room:
    code-length: 6
    expiry-minutes: 60
    max-peers-per-room: 2
